name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # [2026-05-02 Roy] wrangler 4.87+ requires Node 22+ (이전 20에서 deploy 실패)
          node-version: 22

      - name: Inject KV namespace id
        working-directory: workers
        env:
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          sed -i "s/PLACEHOLDER_KV_ID/${CF_KV_NAMESPACE_ID}/" wrangler.toml
          echo "wrangler.toml after sed:"
          cat wrangler.toml

      - name: Deploy via wrangler
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest deploy

      # [2026-05-05 PM-46 Roy Phase 2] WAE SQL 쿼리용 자격증명을 Worker secret으로 푸시.
      # /usage-summary-v2 endpoint가 런타임에 env.AE_QUERY_TOKEN / env.CF_ACCOUNT_ID 로 사용.
      # secret put은 idempotent — 매 배포마다 덮어쓰기 OK. 토큰은 GitHub Secret만 알고
      # Worker는 자체 secret store에 저장 (소스코드/로그 노출 0).
      - name: Push Worker runtime secrets (AE query)
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_AE_QUERY_TOKEN: ${{ secrets.CF_AE_QUERY_TOKEN }}
        run: |
          if [ -n "$CF_AE_QUERY_TOKEN" ]; then
            echo "$CF_AE_QUERY_TOKEN" | npx --yes wrangler@latest secret put AE_QUERY_TOKEN
            echo "$CLOUDFLARE_ACCOUNT_ID" | npx --yes wrangler@latest secret put CF_ACCOUNT_ID
          else
            echo "::warning::CF_AE_QUERY_TOKEN secret not set; /usage-summary-v2 will fail at runtime"
          fi
