name: Deploy Blend Daily Report Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers-daily-report/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy via wrangler
        working-directory: workers-daily-report
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest deploy

      # [2026-05-05 PM-46 Phase 5 Roy] Telegram 발송용 secret을 Worker에 자동 푸시.
      # GH Secrets에 이미 있는 TELEGRAM_BOT_TOKEN/CHAT_ID를 wrangler secret put으로 동기화.
      # 이전 회귀: blend-daily-report에 secret 미설정 → "TELEGRAM_CHAT_ID is not set"
      # 에러로 매일 cron 실패 (KV에 last_error만 남고 알림 안 감).
      - name: Push Telegram secrets to Worker
        working-directory: workers-daily-report
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "$TELEGRAM_BOT_TOKEN" | npx --yes wrangler@latest secret put TELEGRAM_BOT_TOKEN
            echo "$TELEGRAM_CHAT_ID"   | npx --yes wrangler@latest secret put TELEGRAM_CHAT_ID
          else
            echo "::warning::TELEGRAM_BOT_TOKEN or CHAT_ID GH Secret not set; cron will fail"
          fi
