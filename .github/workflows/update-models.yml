name: Update Model Registry

on:
  schedule:
    # [2026-05-03 Roy] 3시간마다 → 하루 1회 KST 00:30 (UTC 15:30 전날). 신모델 출시
    # 알림 + 다음날 KST 08:40 daily-telegram-report에 어제 sync 결과 append되도록 timing.
    - cron: '30 15 * * *'  # KST 00:30 daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run model updater
        env:
          ANTHROPIC_MODELS_KEY: ${{ secrets.ANTHROPIC_MODELS_KEY }}
          OPENAI_MODELS_KEY:    ${{ secrets.OPENAI_MODELS_KEY }}
          GOOGLE_MODELS_KEY:    ${{ secrets.GOOGLE_MODELS_KEY }}
          DEEPSEEK_MODELS_KEY:  ${{ secrets.DEEPSEEK_MODELS_KEY }}
          GROQ_MODELS_KEY:      ${{ secrets.GROQ_MODELS_KEY }}
          # [2026-05-03 Roy] 신모델 추가/폐기 시 Roy에게 텔레그램 자동 보고 (Blend Fully Agentic)
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx scripts/update-models.ts

      - name: Commit if changed
        run: |
          if ! git diff --quiet src/data/available-models.generated.json scripts/update-models.ts; then
            git config user.name "blend-bot"
            git config user.email "bot@blend.ai4min.com"
            git add src/data/available-models.generated.json scripts/update-models.ts
            git commit -m "chore(models): auto-update registry + meta [$(date -u +"%Y-%m-%d %H:%M UTC")]"
            git push
          else
            echo "No changes to commit."
          fi
