name = "blend-counter"
main = "blend-counter.ts"
compatibility_date = "2026-04-25"

# KV namespace id는 GitHub Secrets CF_KV_NAMESPACE_ID로 채워짐.
# 로컬 배포 시: 아래 PLACEHOLDER_KV_ID를 실제 namespace id로 치환 후 `wrangler deploy`
# CI 배포 시 : .github/workflows/deploy-worker.yml에서 sed로 치환

[[kv_namespaces]]
binding = "STATS"
id = "PLACEHOLDER_KV_ID"

# [2026-05-05 PM-46 Roy] Workers Analytics Engine binding — KV race lost update 회귀 정정용.
# 데이터셋 이름은 첫 writeDataPoint 호출 시 자동 생성됨 (사전 콘솔 작업 불필요).
# 무료 한도: 100K events/day write + 10K queries/day. Blend 현재 사용량(일 ~24건)에 충분.
# 출시 후 트래픽 증가 시에도 paid plan 한도(월 10M write)에 여유 큼.
[[analytics_engine_datasets]]
binding = "USAGE_AE"
dataset = "blend_usage"
