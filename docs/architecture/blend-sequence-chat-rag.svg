<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1500" width="1800" height="1500"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F2937"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803D"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1D4ED8"/>
    </marker>
    <style>
      .lane-h  { font-size: 13px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; }
      .step-n  { font-size: 11px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; }
      .msg     { font-size: 11px; fill: #1F2937; }
      .msg-r   { font-size: 11px; fill: #DC2626; }
      .msg-g   { font-size: 11px; fill: #166534; }
      .msg-b   { font-size: 11px; fill: #1E3A8A; }
      .note    { font-size: 10px; fill: #6B7280; font-style: italic; }
      .frame   { font-size: 11px; font-weight: 700; fill: #6B21A8; }
    </style>
  </defs>

  <!-- Title -->
  <text x="900" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">📨 Sequence — Chat with RAG · Tool Use · Cost Tracking · Analytics</text>
  <text x="900" y="54" text-anchor="middle" font-size="12" fill="#6B7280">
    User input부터 Daily Pulse 누적까지 — Blend의 핵심 user journey · 모든 8 layer 통과
  </text>

  <!-- Lane headers (8 actors) -->
  <g>
    <rect x="40"   y="80" width="200" height="42" fill="#374151" rx="4"/>
    <text x="140" y="106" class="lane-h">👤 User</text>
    <rect x="245"  y="80" width="200" height="42" fill="#1D4ED8" rx="4"/>
    <text x="345" y="106" class="lane-h">💬 Chat View</text>
    <rect x="450"  y="80" width="200" height="42" fill="#CA8A04" rx="4"/>
    <text x="550" y="106" class="lane-h">🗄️ Stores (Zustand)</text>
    <rect x="655"  y="80" width="200" height="42" fill="#475569" rx="4"/>
    <text x="755" y="106" class="lane-h">🔧 Core Libs</text>
    <rect x="860"  y="80" width="200" height="42" fill="#EA580C" rx="4"/>
    <text x="960" y="106" class="lane-h">📁 IndexedDB · RAG</text>
    <rect x="1065" y="80" width="200" height="42" fill="#7C3AED" rx="4"/>
    <text x="1165" y="106" class="lane-h">🤖 AI Provider</text>
    <rect x="1270" y="80" width="200" height="42" fill="#15803D" rx="4"/>
    <text x="1370" y="106" class="lane-h">⚙️ blend-counter</text>
    <rect x="1475" y="80" width="200" height="42" fill="#0284C7" rx="4"/>
    <text x="1575" y="106" class="lane-h">📊 WAE / Telegram</text>
  </g>

  <!-- Lifelines (vertical dashed) -->
  <line x1="140"  y1="125" x2="140"  y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="345"  y1="125" x2="345"  y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="550"  y1="125" x2="550"  y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="755"  y1="125" x2="755"  y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="960"  y1="125" x2="960"  y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="1165" y1="125" x2="1165" y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="1370" y1="125" x2="1370" y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="1575" y1="125" x2="1575" y2="1430" stroke="#9CA3AF" stroke-dasharray="3 3"/>

  <!-- ===== Step 1: User input ===== -->
  <circle cx="60" cy="160" r="12" fill="#DC2626"/>
  <text x="60" y="164" class="step-n">1</text>
  <line x1="140" y1="160" x2="345" y2="160" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="153" class="msg" text-anchor="middle">type · Enter / 전송 클릭</text>
  <text x="240" y="174" class="note" text-anchor="middle">→ handleSend(text, attachments)</text>

  <!-- ===== Step 2: Add user message ===== -->
  <circle cx="60" cy="200" r="12" fill="#1D4ED8"/>
  <text x="60" y="204" class="step-n">2</text>
  <line x1="345" y1="200" x2="550" y2="200" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="193" class="msg" text-anchor="middle">chat-store.addUserMessage()</text>
  <text x="447" y="214" class="note" text-anchor="middle">role:'user' · attachments · timestamp</text>

  <!-- ===== Step 3: SessionLoadBar 시작 ===== -->
  <circle cx="60" cy="240" r="12" fill="#475569"/>
  <text x="60" y="244" class="step-n">3</text>
  <rect x="320" y="232" width="50" height="20" fill="#FEF3C7" stroke="#CA8A04" stroke-width="1"/>
  <text x="345" y="246" font-size="10" text-anchor="middle">activate</text>
  <line x1="345" y1="252" x2="755" y2="270" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="552" y="262" class="msg" text-anchor="middle">session-load.calculate()</text>
  <text x="552" y="280" class="note" text-anchor="middle">→ baseLatency × messages² · 70/90/100% 임계</text>

  <!-- ===== Step 4: intent-classifier ===== -->
  <circle cx="60" cy="310" r="12" fill="#475569"/>
  <text x="60" y="314" class="step-n">4</text>
  <line x1="345" y1="310" x2="755" y2="310" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="303" class="msg" text-anchor="middle">intent-classifier.detect(query)</text>
  <text x="550" y="324" class="note" text-anchor="middle">→ "chat" / "search" / "code" / "image" / "weather" 분류</text>
  <line x1="755" y1="335" x2="345" y2="335" stroke="#475569" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="550" y="348" class="note" text-anchor="middle">return: { intent, confidence }</text>

  <!-- ===== Step 5: Active sources query ===== -->
  <circle cx="60" cy="380" r="12" fill="#CA8A04"/>
  <text x="60" y="384" class="step-n">5</text>
  <line x1="345" y1="380" x2="550" y2="380" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="373" class="msg" text-anchor="middle">datasource-store.activeIds</text>
  <text x="447" y="394" class="note" text-anchor="middle">RAG enabled? + 활성 소스 list</text>

  <!-- ===== Step 6: Vector search ===== -->
  <circle cx="60" cy="430" r="12" fill="#EA580C"/>
  <text x="60" y="434" class="step-n">6</text>
  <line x1="345" y1="430" x2="755" y2="430" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="423" class="msg" text-anchor="middle">source-indexer.query(text, k=5)</text>
  <line x1="755" y1="450" x2="960" y2="450" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="857" y="443" class="msg" text-anchor="middle">vector-db.cosine(emb)</text>
  <text x="857" y="463" class="note" text-anchor="middle">1536-dim · top-K · IndexedDB</text>
  <line x1="960" y1="475" x2="345" y2="475" stroke="#EA580C" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="650" y="488" class="msg-g" text-anchor="middle">chunks[] (text + metadata + score)</text>

  <!-- ===== Step 7: Tool detection ===== -->
  <circle cx="60" cy="520" r="12" fill="#475569"/>
  <text x="60" y="524" class="step-n">7</text>
  <line x1="345" y1="520" x2="755" y2="520" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="513" class="msg" text-anchor="middle">ai-tools.detect(intent, query)</text>
  <text x="550" y="534" class="note" text-anchor="middle">→ web-search / image-gen / url-reader / code-runner / chart-render</text>

  <!-- Frame: Optional Tool Call -->
  <rect x="320" y="555" width="850" height="80" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 3" rx="4"/>
  <rect x="320" y="555" width="100" height="20" fill="#7C3AED"/>
  <text x="370" y="569" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">opt [tool needed]</text>
  <text x="745" y="592" class="msg" text-anchor="middle">/api/web-search · /api/image-gen 등 (Edge functions)</text>
  <text x="745" y="610" class="note" text-anchor="middle">tool 결과 → context에 주입 → 다음 단계로</text>
  <text x="745" y="626" class="note" text-anchor="middle">(예: web-search → Tavily/Brave API → snippet 5개)</text>

  <!-- ===== Step 8: Model selection ===== -->
  <circle cx="60" cy="670" r="12" fill="#475569"/>
  <text x="60" y="674" class="step-n">8</text>
  <line x1="345" y1="670" x2="755" y2="670" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="663" class="msg" text-anchor="middle">model-router.selectBestModel({intent, length, hasImage})</text>
  <text x="550" y="684" class="note" text-anchor="middle">→ 사용자 BYOK 키 보유 + intent 매칭 → provider/model 결정</text>
  <line x1="755" y1="700" x2="345" y2="700" stroke="#475569" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="550" y="715" class="msg-g" text-anchor="middle">{ provider:'anthropic', model:'claude-4-7-sonnet', fallback:[...] }</text>

  <!-- ===== Step 9: API key & system prompt ===== -->
  <circle cx="60" cy="750" r="12" fill="#CA8A04"/>
  <text x="60" y="754" class="step-n">9</text>
  <line x1="345" y1="750" x2="550" y2="750" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="743" class="msg" text-anchor="middle">api-key-store.get(provider)</text>
  <text x="447" y="764" class="note" text-anchor="middle">+ blend-identity.SYSTEM_PROMPT 주입</text>

  <!-- ===== Step 10: BYOK direct call ===== -->
  <circle cx="60" cy="800" r="12" fill="#7C3AED"/>
  <text x="60" y="804" class="step-n">10</text>
  <line x1="345" y1="800" x2="1165" y2="800" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="755" y="793" class="msg" text-anchor="middle">POST https://api.anthropic.com/v1/messages (BYOK direct, streaming)</text>
  <text x="755" y="813" class="note" text-anchor="middle">headers: x-api-key: sk-ant-... · body: {messages, system, tools, stream:true}</text>

  <!-- ===== Step 11: Streaming chunks ===== -->
  <circle cx="60" cy="855" r="12" fill="#7C3AED"/>
  <text x="60" y="859" class="step-n">11</text>
  <line x1="1165" y1="855" x2="345" y2="855" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="755" y="848" class="msg-g" text-anchor="middle">SSE chunks: { delta: {text}, usage: {input,output} }</text>
  <text x="755" y="868" class="note" text-anchor="middle">onChunk → chat-store.appendChunk → UI re-render (per chunk)</text>

  <!-- ===== Step 12: Stream complete ===== -->
  <circle cx="60" cy="905" r="12" fill="#1D4ED8"/>
  <text x="60" y="909" class="step-n">12</text>
  <line x1="345" y1="905" x2="550" y2="905" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="898" class="msg" text-anchor="middle">chat-store.finalizeMessage()</text>
  <text x="447" y="918" class="note" text-anchor="middle">role:'assistant' · 전체 text · token usage</text>

  <!-- ===== Step 13: Cost calc ===== -->
  <circle cx="60" cy="955" r="12" fill="#475569"/>
  <text x="60" y="959" class="step-n">13</text>
  <line x1="345" y1="955" x2="755" y2="955" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="948" class="msg" text-anchor="middle">calculateCost(model, inputTokens, outputTokens)</text>
  <text x="550" y="968" class="note" text-anchor="middle">model-registry pricing × tokens → costUSD (마이크로센트 정밀도)</text>

  <!-- ===== Step 14: Update usage ===== -->
  <circle cx="60" cy="1005" r="12" fill="#CA8A04"/>
  <text x="60" y="1009" class="step-n">14</text>
  <line x1="345" y1="1005" x2="550" y2="1005" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="998" class="msg" text-anchor="middle">usage-store.tick({model, costUSD, in, out})</text>
  <text x="447" y="1018" class="note" text-anchor="middle">localStorage persist · 90일 자동 정리 · dailyCost 누적</text>

  <!-- ===== Step 15: trackUsage POST ===== -->
  <circle cx="60" cy="1055" r="12" fill="#15803D"/>
  <text x="60" y="1059" class="step-n">15</text>
  <line x1="345" y1="1055" x2="1370" y2="1055" stroke="#15803D" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="857" y="1048" class="msg-g" text-anchor="middle">analytics.trackUsage() — POST /track-usage</text>
  <text x="857" y="1068" class="note" text-anchor="middle">keepalive POST · {provider, model, costUSD, inputTokens, outputTokens, country, os, kstHour}</text>

  <!-- ===== Step 16: WAE writeDataPoint + KV dual ===== -->
  <circle cx="60" cy="1105" r="12" fill="#0284C7"/>
  <text x="60" y="1109" class="step-n">16</text>
  <line x1="1370" y1="1105" x2="1575" y2="1105" stroke="#0284C7" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="1472" y="1098" class="msg-b" text-anchor="middle">env.AE.writeDataPoint(...)</text>
  <text x="1472" y="1118" class="note" text-anchor="middle">indexes:[provider] blobs:[...] doubles:[cost,in,out]</text>
  <line x1="1370" y1="1135" x2="1575" y2="1135" stroke="#0284C7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrB)"/>
  <text x="1472" y="1148" class="note" text-anchor="middle">+ KV.put (legacy dual-write, 90d TTL)</text>

  <!-- ===== Step 17: SessionLoadBar update ===== -->
  <circle cx="60" cy="1175" r="12" fill="#1D4ED8"/>
  <text x="60" y="1179" class="step-n">17</text>
  <line x1="550" y1="1175" x2="345" y2="1175" stroke="#475569" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="447" y="1168" class="note" text-anchor="middle">subscribe(usage-store) → re-calc</text>
  <line x1="345" y1="1190" x2="140" y2="1190" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="1183" class="msg" text-anchor="middle">SessionLoadBar 업데이트</text>
  <text x="240" y="1203" class="note" text-anchor="middle">검정 → 주황(70%) → 빨강(90%)</text>

  <!-- ===== Step 18: Optional TTS ===== -->
  <rect x="320" y="1220" width="500" height="60" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 3" rx="4"/>
  <rect x="320" y="1220" width="120" height="20" fill="#7C3AED"/>
  <text x="380" y="1234" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">opt [듣기 ON]</text>
  <circle cx="60" cy="1250" r="12" fill="#475569"/>
  <text x="60" y="1254" class="step-n">18</text>
  <line x1="345" y1="1250" x2="755" y2="1250" stroke="#1F2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="552" y="1243" class="msg" text-anchor="middle">voice-chat.tts(text)</text>
  <text x="552" y="1263" class="note" text-anchor="middle">Web Speech API · SpeechSynthesis · 사용자 디바이스</text>

  <!-- ===== Step 19: 다음날 KST 08:35 cron =====-->
  <rect x="320" y="1295" width="1255" height="115" fill="none" stroke="#0284C7" stroke-width="1.5" rx="4"/>
  <rect x="320" y="1295" width="220" height="20" fill="#0284C7"/>
  <text x="430" y="1309" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">async [Cron KST 08:35]</text>
  <circle cx="60" cy="1335" r="12" fill="#0284C7"/>
  <text x="60" y="1339" class="step-n">19</text>
  <text x="345" y="1330" class="msg-b">⏰ blend-daily-report cron 발화</text>
  <line x1="1575" y1="1340" x2="1370" y2="1340" stroke="#0284C7" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="1472" y="1333" class="msg-b" text-anchor="middle">env.BLEND_COUNTER.fetch(...) (Service Binding)</text>
  <text x="1472" y="1353" class="note" text-anchor="middle">/usage-detailed?date=어제 + 4 endpoint 조회</text>
  <line x1="1370" y1="1375" x2="1575" y2="1375" stroke="#0284C7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrB)"/>
  <text x="1472" y="1390" class="msg-b" text-anchor="middle">11 insights → Telegram Bot API → Roy</text>

  <!-- Notes box (right side) -->
  <rect x="40" y="1430" width="1735" height="60" fill="#F0FDF4" stroke="#15803D" rx="4"/>
  <text x="56" y="1452" font-size="11" font-weight="700" fill="#166534">📋 핵심 보장</text>
  <text x="56" y="1470" font-size="10" fill="#374151">• BYOK direct (10단계) — 키는 사용자 localStorage, 운영 비용 0  · WAE append-only (16) — race lost 없음 (171=171 정확)  · Service Binding (19) — public URL fetch 시 CF loop 차단 (error 1042) 우회</text>
  <text x="56" y="1486" font-size="10" fill="#374151">• 자동 fallback chain (8) — 1차 picked 실패 시 다른 provider 자동 retry · keepalive POST (15) — 페이지 떠나도 전송 보장 · UI streaming (11) — 첫 chunk 200ms 이내</text>
</svg>
